<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Trading - Produção Final</title>
    <style>
        :root { --bg-dark: #07090e; --panel-bg: #141822; --border: #232836; --green: #089981; --red: #f23645; --orange: #ff9800; --text-main: #e2e5eb; --text-muted: #848e9c; --brand: #2962ff; }
        * { box-sizing: border-box; }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg-dark); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .no-select { user-select: none; }
        
        .sidebar-nav { width: 220px; background: var(--panel-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0;}
        .brand-logo { padding: 20px; font-size: 18px; font-weight: 900; border-bottom: 1px solid var(--border); }
        .brand-logo span { color: var(--brand); }
        .nav-menu { padding: 15px 0; flex: 1; overflow-y: auto; }
        .nav-item { padding: 12px 20px; color: var(--text-muted); font-size: 14px; cursor: pointer; display: flex; justify-content: space-between;}
        .nav-item:hover, .nav-item.active { background: rgba(41, 98, 255, 0.1); color: var(--brand); border-left: 3px solid var(--brand); }
        
        .main-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        header { background: var(--panel-bg); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .asset-selector { background: var(--bg-dark); color: white; border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-size: 16px; font-weight: bold; }
        .audio-toggle { background: var(--bg-dark); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 12px; border-radius: 6px; cursor: pointer; }
        .audio-toggle.active { color: var(--green); border-color: var(--green); }
        .top-stats { display: flex; gap: 15px; }
        .stat-box { background: var(--bg-dark); padding: 8px 15px; border-radius: 6px; border: 1px solid var(--border); font-size: 12px; }
        .stat-val { font-size: 16px; font-weight: bold; margin-top: 3px; }

        .view-section { display: none; height: calc(100vh - 72px); width: 100%; }
        .view-section.active { display: flex; }
        .left-content { flex: 1; min-width: 60%; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
        .chart-area { flex: 1; background: #07090e; }
        .history-panel { height: 180px; background: var(--panel-bg); border-top: 1px solid var(--border); display: flex; flex-direction: column; }
        .history-header { padding: 10px 20px; font-size: 12px; font-weight: bold; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        .history-list { flex: 1; overflow-y: auto; padding: 0 10px; }
        .history-item { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; align-items: center; }
        .badge-win { background: rgba(8, 153, 129, 0.1); color: var(--green); padding: 4px 8px; border-radius: 4px; font-weight: bold; text-align: center;}
        .badge-loss { background: rgba(242, 54, 69, 0.1); color: var(--red); padding: 4px 8px; border-radius: 4px; font-weight: bold; text-align: center;}
        .side-panel { width: 360px; background: var(--bg-dark); display: flex; flex-direction: column; padding: 20px; gap: 15px; overflow-y: auto; flex-shrink: 0;}

        .auto-trade-box { background: rgba(41, 98, 255, 0.05); border: 1px solid rgba(41, 98, 255, 0.2); padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;}
        .toggle-switch { position: relative; width: 40px; height: 20px; background: var(--border); border-radius: 20px; transition: 0.3s; }
        .toggle-switch::after { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .toggle-switch.active { background: var(--brand); }
        .toggle-switch.active::after { left: 22px; }

        .tf-selector { display: flex; gap: 10px; margin-bottom: 5px; }
        .tf-btn { flex: 1; background: var(--panel-bg); border: 1px solid var(--border); color: var(--text-muted); padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px;}
        .tf-btn.active { background: var(--brand); color: white; border-color: var(--brand); }
        
        .signal-box { background: var(--panel-bg); border-radius: 8px; padding: 20px; text-align: center; border: 1px solid var(--border); }
        .action-text { font-size: 26px; font-weight: 900; margin: 5px 0; color: var(--text-muted); }
        .timer-container { margin-top: 15px; display: none; background: rgba(255, 152, 0, 0.1); padding: 10px; border-radius: 8px; border: 1px dashed var(--orange); }
        .timer-bar-bg { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 3px; margin-top: 5px; overflow: hidden;}
        .timer-bar-fill { height: 100%; width: 100%; background: var(--orange); transition: width 0.1s linear; }

        .input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; width: 100%;}
        .input-group label { font-size: 13px; color: var(--text-muted); width: 40%;}
        .input-control { background: var(--bg-dark); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 4px; width: 60%; outline: none; border: 1px solid var(--border);}
        .btn-primary { background: var(--brand); color: white; border: none; padding: 14px; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px;}
        .btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

        .toast-container { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 9999;}
        .toast { background: var(--panel-bg); border-left: 4px solid var(--brand); color: white; padding: 15px 20px; border-radius: 6px; font-size: 13px; opacity: 1; }
        .toast.success { border-left-color: var(--green); }
        .toast.error { border-left-color: var(--red); }
        
        /* Telas Genéricas */
        .generic-view-content { padding: 40px; flex: 1; overflow-y: auto; display: flex; justify-content: center; align-items: flex-start;}
        .card { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 8px; padding: 30px; width: 100%; max-width: 600px;}
        .card h2 { margin-top: 0; font-size: 20px; color: white; border-bottom: 1px solid var(--border); padding-bottom: 15px;}
        .card p { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 25px;}

        .conn-status { font-size: 12px; display: flex; align-items: center; gap: 6px; color: var(--text-muted); margin-top: 5px; }
        .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); box-shadow: 0 0 5px var(--red);}
        .conn-dot.online { background: var(--green); box-shadow: 0 0 5px var(--green);}
    </style>
</head>
<body>
    <div class="sidebar-nav no-select">
        <div class="brand-logo">Auto<span>Trade</span> AI</div>
        <div class="nav-menu">
            <div class="nav-item active" data-target="view-sinais">📈 Sala de Sinais</div>
            <div class="nav-item" data-target="view-config">⚙️ Conexão API</div>
        </div>
    </div>

    <div class="main-wrapper">
        <header>
            <div class="header-left">
                <select id="asset-selector" class="asset-selector">
                    <option value="FX:EURUSD">🇪🇺🇺🇸 EUR/USD</option>
                    <option value="FX:GBPUSD">🇬🇧🇺🇸 GBP/USD</option>
                </select>
                <button id="btn-audio" class="audio-toggle">🔇</button>
            </div>
            <div class="top-stats">
                <div class="stat-box">Win Rate<div class="stat-val" style="color: var(--brand);" id="winrate-display">0%</div></div>
                <div class="stat-box">Banca Atual<div class="stat-val" style="color: var(--text-main);" id="balance-display">R$ 0,00</div></div>
                <div class="stat-box">Lucro<div class="stat-val" style="color: var(--green);" id="profit-display">+ R$ 0,00</div></div>
            </div>
        </header>

        <section id="view-sinais" class="view-section active">
            <div class="left-content">
                <div class="chart-area" id="chart-container"><div id="tradingview_chart" style="height: 100%; width: 100%;"></div></div>
                <div class="history-panel">
                    <div class="history-header">Histórico de Operações</div>
                    <div class="history-list" id="history-list"></div>
                </div>
            </div>
            <div class="side-panel">
                <div class="auto-trade-box no-select" id="btn-autotrade">
                    <div>
                        <div style="font-weight: bold; font-size: 14px; color: white;">Auto-Execução</div>
                        <div style="font-size: 11px; color: var(--text-muted); margin-top: 3px;">Servidor na Nuvem</div>
                    </div>
                    <div class="toggle-switch" id="autotrade-toggle"></div>
                </div>
                <div class="tf-selector no-select">
                    <button class="tf-btn active" data-tf="M5">5 Min</button>
                    <button class="tf-btn" data-tf="M15">15 Min</button>
                </div>
                <div class="signal-box" id="signal-box">
                    <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 10px;" id="signal-tf-label">Ação Recomendada (M5)</div>
                    <div class="action-text" id="action-text">ANALISANDO...</div>
                    <div id="timer-container" class="timer-container">
                        <div style="font-size: 13px; font-weight: bold; color: var(--text-main); display: flex; justify-content: space-between;">
                            <span>Expiração:</span> <span id="timer-seconds">0.0s</span>
                        </div>
                        <div class="timer-bar-bg"><div class="timer-bar-fill" id="timer-bar"></div></div>
                    </div>
                </div>
                <div style="background: var(--panel-bg); border-radius: 8px; padding: 15px; border: 1px solid var(--border);">
                    <div class="input-group"><label>Mão Inicial (R$):</label><input type="number" id="input-mao" class="input-control" value="50"></div>
                    <div class="input-group">
                        <label>Martingale:</label>
                        <select id="input-gale" class="input-control"><option value="0">Desativado</option><option value="1">Até 1 Nível</option></select>
                    </div>
                    <button class="btn-primary" id="btn-manual-trade" disabled>Aguardando Oportunidade...</button>
                </div>
            </div>
        </section>

        <section id="view-config" class="view-section">
            <div class="generic-view-content">
                <div class="card">
                    <h2>⚙️ Conexão de Servidor</h2>
                    <p>Status da comunicação com o Backend Node.js.</p>
                    <div class="conn-status" id="ws-status" style="font-size: 16px; margin-bottom: 20px;"><div class="conn-dot" id="ws-dot"></div> Conectando à Nuvem...</div>
                    <button class="btn-primary" id="btn-save-api">Simular Vínculo de Corretora</button>
                </div>
            </div>
        </section>
    </div>
    
    <div class="toast-container" id="toast-container"></div>

    <!-- O pulo do gato: Esta linha conecta o HTML ao servidor Node.js -->
    <script src="/socket.io/socket.io.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <script>
        class TradingApp {
            constructor() {
                this.state = {
                    balance: 4250.00, dailyProfit: 0.00, totalWins: 0, totalLosses: 0,
                    activeAsset: 'FX:EURUSD', activeTF: 'M5',
                    isAutoTrade: false, baseTradeAmount: 50, currentTradeAmount: 50, 
                    martingaleMaxLevel: 0, currentMartingaleStep: 0, systemLocked: false, 
                    signalActive: false, timerInterval: null, marketTimeout: null, audioEnabled: false, apiConnected: false,
                    tfConfig: { 'M5': { windowMs: 10000, chartInterval: "5" }, 'M15': { windowMs: 20000, chartInterval: "15" } }
                };
                this.ui = {
                    assetSelector: document.getElementById('asset-selector'), balanceDisplay: document.getElementById('balance-display'),
                    profitDisplay: document.getElementById('profit-display'), winrateDisplay: document.getElementById('winrate-display'),
                    btnAutoTrade: document.getElementById('btn-autotrade'), toggleAutoTrade: document.getElementById('autotrade-toggle'),
                    signalBox: document.getElementById('signal-box'), actionText: document.getElementById('action-text'),
                    timerContainer: document.getElementById('timer-container'), timerSeconds: document.getElementById('timer-seconds'),
                    timerBar: document.getElementById('timer-bar'), inputMao: document.getElementById('input-mao'),
                    inputGale: document.getElementById('input-gale'), btnManualTrade: document.getElementById('btn-manual-trade'),
                    navItems: document.querySelectorAll('.nav-item'), viewSections: document.querySelectorAll('.view-section'),
                    signalTfLabel: document.getElementById('signal-tf-label'), tfButtons: document.querySelectorAll('.tf-btn'),
                    historyList: document.getElementById('history-list'), btnAudio: document.getElementById('btn-audio'),
                    wsDot: document.getElementById('ws-dot'), wsStatus: document.getElementById('ws-status'), btnSaveApi: document.getElementById('btn-save-api')
                };
                this.init();
            }

            init() {
                this.loadChart(); this.bindEvents(); this.updateFinancialUI();
                this.connectToServer(); 
            }

            // O CONECTOR REAL (WEB SOCKETS)
            connectToServer() {
                this.socket = io(); // Conecta no servidor Node.js
                
                this.socket.on('connect', () => {
                    this.ui.wsDot.classList.add('online');
                    this.ui.wsStatus.innerHTML = `<div class="conn-dot online"></div> Backend Node.js Online`;
                    this.showToast("Conexão estabelecida com a Nuvem!", "success");
                    this.startMarketLoop();
                });

                this.socket.on('disconnect', () => {
                    this.ui.wsDot.classList.remove('online');
                    this.ui.wsStatus.innerHTML = `<div class="conn-dot"></div> Servidor Offline`;
                    this.showToast("Conexão com a nuvem perdida.", "error");
                });

                // Ouve os logs que o servidor Node.js envia enquanto o robô clica lá na nuvem
                this.socket.on('notificacao', (data) => {
                    this.showToast(data.msg, data.tipo);
                });

                // Ouve a confirmação de que a ordem foi registrada
                this.socket.on('resultado_ordem', (data) => {
                    this.showToast(data.msg, "success");
                    // Simula o fechamento da vela (Win/Loss) 3 segundos depois que a ordem foi feita
                    setTimeout(() => this.processTradeResult(true), 3000); 
                });
            }

            bindEvents() {
                this.ui.navItems.forEach(item => item.addEventListener('click', (e) => {
                    this.ui.navItems.forEach(nav => nav.classList.remove('active')); item.classList.add('active');
                    this.ui.viewSections.forEach(sec => sec.classList.remove('active'));
                    document.getElementById(item.getAttribute('data-target')).classList.add('active');
                }));
                this.ui.btnAudio.addEventListener('click', () => { this.state.audioEnabled = !this.state.audioEnabled; this.ui.btnAudio.innerText = this.state.audioEnabled ? '🔊' : '🔇'; });
                this.ui.assetSelector.addEventListener('change', (e) => { this.state.activeAsset = e.target.value; this.loadChart(); this.resetSignalUI(); });
                this.ui.tfButtons.forEach(btn => btn.addEventListener('click', (e) => {
                    this.ui.tfButtons.forEach(b => b.classList.remove('active')); e.target.classList.add('active');
                    this.state.activeTF = e.target.getAttribute('data-tf'); this.ui.signalTfLabel.innerText = `Ação Recomendada (${this.state.activeTF})`;
                    this.loadChart(); this.resetSignalUI();
                }));
                this.ui.btnSaveApi.addEventListener('click', () => { this.state.apiConnected = true; this.showToast("Simulação: Corretora vinculada com sucesso!", "success"); });
                this.ui.btnAutoTrade.addEventListener('click', () => {
                    if(!this.state.apiConnected) { this.showToast("Vincule a corretora na aba Configurações primeiro.", "error"); return; }
                    this.state.isAutoTrade = !this.state.isAutoTrade; this.ui.toggleAutoTrade.classList.toggle('active', this.state.isAutoTrade);
                });
                this.ui.inputMao.addEventListener('change', (e) => { this.state.baseTradeAmount = parseFloat(e.target.value); this.state.currentTradeAmount = this.state.baseTradeAmount; });
                this.ui.inputGale.addEventListener('change', (e) => this.state.martingaleMaxLevel = parseInt(e.target.value));
                this.ui.btnManualTrade.addEventListener('click', () => { if (this.state.signalActive) this.executeTrade('Manual'); });
            }

            loadChart() { document.getElementById('tradingview_chart').innerHTML = ''; new TradingView.widget({"autosize": true, "symbol": this.state.activeAsset, "interval": this.state.tfConfig[this.state.activeTF].chartInterval, "theme": "dark", "style": "1", "backgroundColor": "#07090e", "hide_top_toolbar": false, "container_id": "tradingview_chart"}); }
            updateFinancialUI() {
                const f = (n) => `R$ ${n.toFixed(2)}`;
                this.ui.balanceDisplay.innerText = f(this.state.balance);
                this.ui.profitDisplay.innerText = this.state.dailyProfit >= 0 ? `+ ${f(this.state.dailyProfit)}` : `- ${f(Math.abs(this.state.dailyProfit))}`;
                this.ui.profitDisplay.style.color = this.state.dailyProfit >= 0 ? 'var(--green)' : 'var(--red)';
                const total = this.state.totalWins + this.state.totalLosses;
                if(total > 0) this.ui.winrateDisplay.innerText = `${((this.state.totalWins / total) * 100).toFixed(1)}%`;
            }
            showToast(msg, type = 'normal') {
                const t = document.createElement('div'); t.className = `toast ${type}`; t.innerText = msg;
                document.getElementById('toast-container').appendChild(t);
                setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
            }
            playAudio() { if(this.state.audioEnabled) { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.frequency.value = 800; osc.start(); setTimeout(() => { osc.stop(); ctx.close(); }, 300); } catch(e){} } }

            startMarketLoop() {
                clearTimeout(this.state.marketTimeout);
                const check = () => {
                    this.resetSignalUI();
                    this.state.marketTimeout = setTimeout(() => {
                        const dir = Math.random() > 0.5 ? 'COMPRA (CALL)' : 'VENDA (PUT)';
                        this.dispatchSignal(dir, dir.includes('COMPRA') ? '#089981' : '#f23645');
                    }, Math.floor(Math.random() * 5000) + 5000);
                };
                check(); this.onSignalExpired = check;
            }

            dispatchSignal(type, color) {
                this.state.signalActive = true; this.ui.signalBox.style.borderColor = color;
                this.ui.actionText.innerText = type; this.ui.actionText.style.color = color;
                this.ui.btnManualTrade.disabled = false; this.ui.btnManualTrade.innerText = `ENTRAR: R$ ${this.state.currentTradeAmount}`; this.ui.btnManualTrade.style.background = color;
                this.ui.timerContainer.style.display = 'block';
                
                if (this.state.isAutoTrade) { this.executeTrade('Nuvem'); } 
                else { this.playAudio(); this.showToast(`NOVO SINAL ${this.state.activeTF}!`, "normal"); }

                const end = Date.now() + this.state.tfConfig[this.state.activeTF].windowMs;
                clearInterval(this.state.timerInterval);
                this.state.timerInterval = setInterval(() => {
                    const rem = end - Date.now();
                    if (rem <= 0) { clearInterval(this.state.timerInterval); this.handleSignalExpiration(); }
                    else { this.ui.timerSeconds.innerText = `${(rem/1000).toFixed(1)}s`; this.ui.timerBar.style.width = `${(rem/this.state.tfConfig[this.state.activeTF].windowMs)*100}%`; }
                }, 50);
            }

            executeTrade(source) {
                if (!this.state.signalActive) return;
                this.state.signalActive = false; this.ui.btnManualTrade.disabled = true; this.ui.btnManualTrade.style.background = 'var(--border)';

                if(source === 'Nuvem' && this.state.apiConnected) {
                    // Manda a ordem de execução para o nosso server.js rodar no navegador fantasma
                    this.socket.emit('enviar_ordem', { valor: this.state.currentTradeAmount, direcao: this.ui.actionText.innerText.includes('CALL') ? 'CALL' : 'PUT' });
                } else {
                    this.showToast(`Ordem executada na tela.`, "normal");
                    setTimeout(() => this.processTradeResult(true), 3000);
                }
            }

            processTradeResult(simulatedResult) {
                const isWin = Math.random() > 0.3; // Simula a vitória
                const amount = this.state.currentTradeAmount;
                const dir = this.ui.actionText.innerText.includes('CALL') ? 'CALL' : 'PUT';
                const asset = this.ui.assetSelector.value.split(':')[1];

                if (isWin) {
                    const lucro = amount * 0.85; this.state.balance += lucro; this.state.dailyProfit += lucro; this.state.totalWins++;
                    this.state.currentMartingaleStep = 0; this.state.currentTradeAmount = this.state.baseTradeAmount;
                    this.showToast(`✅ VITÓRIA! Lucro: R$ ${lucro.toFixed(2)}`, "success");
                    this.addToHistory(asset, dir, amount, `+ R$ ${lucro.toFixed(2)}`, 'win');
                } else {
                    this.state.balance -= amount; this.state.dailyProfit -= amount; this.state.totalLosses++;
                    if (this.state.currentMartingaleStep < this.state.martingaleMaxLevel) {
                        this.state.currentMartingaleStep++; this.state.currentTradeAmount = amount * 2;
                        this.showToast(`❌ DERROTA. Preparando Gale ${this.state.currentMartingaleStep}...`, "warning");
                    } else {
                        this.state.currentMartingaleStep = 0; this.state.currentTradeAmount = this.state.baseTradeAmount;
                        this.showToast(`❌ DERROTA. Fim de Ciclo.`, "error");
                    }
                    this.addToHistory(asset, dir, amount, `- R$ ${amount.toFixed(2)}`, 'loss');
                }
                this.updateFinancialUI();
            }

            addToHistory(ativo, direcao, valor, res, status) {
                const html = `<div class="history-item"><span style="color:var(--text-muted)">Agora</span><b>${ativo}</b><b style="color:${direcao==='CALL'?'var(--green)':'var(--red)'}">${direcao}</b><span>R$ ${valor.toFixed(2)}</span><span class="${status==='win'?'badge-win':'badge-loss'}">${res}</span></div>`;
                this.ui.historyList.insertAdjacentHTML('afterbegin', html);
            }

            handleSignalExpiration() { this.resetSignalUI(); this.state.marketTimeout = setTimeout(() => { if (this.onSignalExpired) this.onSignalExpired(); }, 3000); }
            resetSignalUI() { this.state.signalActive = false; this.ui.signalBox.style.borderColor = 'var(--border)'; this.ui.actionText.innerText = 'ANALISANDO...'; this.ui.actionText.style.color = 'var(--text-main)'; this.ui.timerContainer.style.display = 'none'; this.ui.btnManualTrade.disabled = true; this.ui.btnManualTrade.innerText = 'Aguardando...'; this.ui.btnManualTrade.style.background = 'var(--brand)'; }
        }
        document.addEventListener("DOMContentLoaded", () => window.App = new TradingApp());
    </script>
</body>
</html>
